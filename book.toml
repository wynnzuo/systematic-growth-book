[book]
title = "系统化成长：自我迭代方法论"
authors = ["wynn"]
language = "zh"
description = "一套可落地、可迭代的成长方法论，帮你把碎片经验变成系统能力。"

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
mathjax-support = false
git-repository-url = "https://github.com/wynnzuo/systematic-growth-book"
edit-url-template = "https://github.com/wynnzuo/systematic-growth-book/edit/main/src/{path}"

[output.html.fold]
enable = true

[output.html.playground]
runnable = false

[preprocessor]
